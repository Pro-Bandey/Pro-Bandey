name: Build Metadata Database

on:
  schedule:
    - cron: '0 0 * * 0' # Runs every Sunday at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch data and build db.json
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            async function generateDatabase() {
              const username = 'Pro-Bandey';

              // Repositories to exclude
              const excludedRepos = [
                'pro-bandey',
                'pro-bandey.github.io',
                '.github',
                'Craft',
                'Dazzle',
                'e-com',
                'ExtensionsReDev',
                'Flat',
                'FontAstic',
                'Fusion',
                'Lounge',
                'MakeFav',
                'minimalistic-wallpapers',
                'My-Folio',
                'StartUp',
                'Zeniod'
              ].map(repo => repo.toLowerCase().trim());

              console.log(`Fetching user profile and contribution years for ${username} via GraphQL...`);
              const userQuery = `
                query($username: String!) {
                  user(login: $username) {
                    login
                    avatarUrl
                    name
                    bio
                    followers {
                      totalCount
                    }
                    following {
                      totalCount
                    }
                    repositories(privacy: PUBLIC) {
                      totalCount
                    }
                    createdAt
                    websiteUrl
                    contributionYears
                  }
                }
              `;

              let userData = null;
              try {
                const userResult = await github.graphql(userQuery, { username: username });
                if (userResult && userResult.user) {
                  const u = userResult.user;
                  const years = u.contributionYears || [];
                  console.log(`Resolved contribution years for ${username}:`, years);

                  let totalContributionsAllTime = 0;
                  const contributions = [];

                  // Fetch contributions for each year to fetch all activities historically
                  for (const year of years) {
                    console.log(`Fetching contributions calendar for year ${year}...`);
                    const yearQuery = `
                      query($username: String!, $from: DateTime!, $to: DateTime!) {
                        user(login: $username) {
                          contributionsCollection(from: $from, to: $to) {
                            contributionCalendar {
                              totalContributions
                              weeks {
                                contributionDays {
                                  contributionCount
                                  date
                                }
                              }
                            }
                          }
                        }
                      }
                    `;
                    const fromDate = `${year}-01-01T00:00:00Z`;
                    const toDate = `${year}-12-31T23:59:59Z`;

                    try {
                      const yearResult = await github.graphql(yearQuery, {
                        username: username,
                        from: fromDate,
                        to: toDate
                      });
                      const calendar = yearResult?.user?.contributionsCollection?.contributionCalendar;
                      if (calendar) {
                        totalContributionsAllTime += calendar.totalContributions || 0;
                        if (calendar.weeks) {
                          for (const week of calendar.weeks) {
                            if (week.contributionDays) {
                              for (const day of week.contributionDays) {
                                contributions.push({
                                  count: day.contributionCount,
                                  date: day.date
                                });
                              }
                            }
                          }
                        }
                      }
                    } catch (yearErr) {
                      console.warn(`Could not fetch contributions for year ${year}:`, yearErr);
                    }
                  }

                  // Sort contributions chronologically
                  contributions.sort((a, b) => new Date(a.date) - new Date(b.date));

                  userData = {
                    login: u.login,
                    avatar_url: u.avatarUrl,
                    name: u.name || 'Pro Bandey',
                    bio: u.bio || '',
                    public_repos: u.repositories?.totalCount || 0,
                    followers: u.followers?.totalCount || 0,
                    following: u.following?.totalCount || 0,
                    location: 'Delhi, India',
                    blog: u.websiteUrl || 'https://pro-bandey.github.io',
                    created_at: u.createdAt,
                    total_contributions: totalContributionsAllTime,
                    contributions: contributions
                  };
                }
              } catch (err) {
                console.warn('Could not fetch user profile details:', err);
              }

              console.log(`Fetching repositories and metadata for ${username} and specified organizations via GraphQL...`);

              const accounts = ['Pro-Bandey', 'MainRoute-Core', 'GGCOkara', 'GitFolderDownloader'];
              const repositories = [];

              for (const account of accounts) {
                console.log(`Fetching public repositories owned by ${account} via repositoryOwner...`);
                try {
                  const ownerQuery = `
                    query($login: String!) {
                      repositoryOwner(login: $login) {
                        repositories(first: 100, privacy: PUBLIC, ownerAffiliations: [OWNER]) {
                          nodes {
                            name
                            createdAt
                            pushedAt
                            isPrivate
                            isArchived
                            description
                            homepageUrl
                            stargazerCount
                            forkCount
                            openGraphImageUrl
                            owner {
                              login
                            }
                            readmeMD: object(expression: "HEAD:README.md") { __typename }
                            readmeMarkdown: object(expression: "HEAD:README.markdown") { __typename }
                            readmeTxt: object(expression: "HEAD:README.txt") { __typename }
                            readmeRaw: object(expression: "HEAD:README") { __typename }
                            languages(first: 20, orderBy: {field: SIZE, direction: DESC}) {
                              edges {
                                size
                                node {
                                  name
                                }
                              }
                            }
                            defaultBranchRef {
                              target {
                                ... on Commit {
                                  history {
                                    totalCount
                                  }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  `;
                  const result = await github.graphql(ownerQuery, { login: account });
                  if (result && result.repositoryOwner && result.repositoryOwner.repositories) {
                    const nodes = result.repositoryOwner.repositories.nodes || [];
                    console.log(`Fetched ${nodes.length} repositories for ${account}`);
                    
                    // Filter repositories to ensure they are strictly owned by the requested account
                    const filteredNodes = nodes.filter(node => {
                      const nodeOwner = node.owner?.login?.toLowerCase().trim();
                      const targetOwner = account.toLowerCase().trim();
                      return nodeOwner === targetOwner;
                    });
                    
                    console.log(`Retained ${filteredNodes.length} strictly owned repositories for ${account}`);
                    repositories.push(...filteredNodes);
                  } else {
                    console.warn(`No repositories returned for ${account}. GraphQL result:`, result);
                  }
                } catch (err) {
                  console.warn(`Could not fetch repositories for ${account}:`, err);
                }
              }

              console.log(
                'Fetched total repositories across all target accounts:',
                repositories.map(r => r.name)
              );

              const reposList = [];

              for (const repo of repositories) {
                const repoName = repo.name.toLowerCase().trim();

                // Skip private repositories just in case
                if (repo.isPrivate) {
                  console.log(`Skipping private repository: ${repo.name}`);
                  continue;
                }

                // Skip excluded repositories
                if (excludedRepos.includes(repoName)) {
                  console.log(`Skipping excluded repository: ${repo.name}`);
                  continue;
                }

                // Check README existence
                const readmeExists = !!(repo.readmeMD || repo.readmeMarkdown || repo.readmeTxt || repo.readmeRaw);

                // Process languages
                const languagesData = {};
                const languageBytes = {};
                if (repo.languages && repo.languages.edges) {
                  const totalBytes = repo.languages.edges.reduce((sum, edge) => sum + edge.size, 0);
                  if (totalBytes > 0) {
                    for (const edge of repo.languages.edges) {
                      const lang = edge.node.name;
                      const bytes = edge.size;
                      languagesData[lang] = parseFloat(((bytes / totalBytes) * 100).toFixed(1));
                      languageBytes[lang] = bytes;
                    }
                  }
                }

                // Add repository to database
                reposList.push({
                  Repo: repo.name,
                  Owner: repo.owner?.login || 'Pro-Bandey',
                  Date: repo.createdAt,
                  UpdatedAt: repo.pushedAt || repo.createdAt,
                  Status: 'Pub',
                  Desc: repo.description || 'No description provided.',
                  Langs: languagesData,
                  LangBytes: languageBytes,
                  PreviewUrl: repo.homepageUrl || '',
                  ReadMeIs: readmeExists,
                  Banner: repo.openGraphImageUrl || '',
                  Commits: repo.defaultBranchRef?.target?.history?.totalCount || 0,
                  Stars: repo.stargazerCount || 0,
                  Forks: repo.forkCount || 0,
                  Archived: repo.isArchived || false
                });
              }

              // Save unified JSON database
              const outputDb = {
                user: userData,
                repos: reposList
              };

              fs.writeFileSync('db.json', JSON.stringify(outputDb, null, 2));

              console.log(
                `Successfully created db.json with ${reposList.length} repository records and user profile.`
              );
            }

            await generateDatabase();

      - name: Deploy db.json to db branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Save generated file temporarily
          mv db.json /tmp/db.json

          # Fetch db branch if it exists
          git fetch origin db || true

          # Checkout db branch or create it
          git checkout db || git checkout --orphan db

          # Remove old files
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

          # Restore db.json
          mv /tmp/db.json db.json

          # Commit changes
          git add db.json
          git commit -m "Automated update of repository database" || echo "No changes to commit"

          # Force push db branch
          git push origin db --force
